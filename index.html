<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LARP | Assistance Bot Status</title>
    <style>
        :root {
            --bg: #05070a;
            --card: #0f121a;
            --primary: #5865F2;
            --success: #10b981;
            --danger: #ef4444;
            --text: #ffffff;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .dashboard {
            width: 100%;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .main-title { text-align: center; }
        .main-title h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(90deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
        }
        .main-title p {
            color: var(--primary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            margin-top: 5px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }
        .stat-box {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
        }
        .stat-label { color: var(--text-dim); font-size: 0.75rem; text-transform: uppercase; margin-bottom: 5px; font-weight: 600; }
        .stat-value { font-size: 1.25rem; font-weight: 800; }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
        }

        .status-hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .indicator {
            width: 70px; height: 70px; border-radius: 50%;
            margin-bottom: 20px; position: relative;
            background: #1a1f2e;
            display: flex; justify-content: center; align-items: center;
        }
        .indicator.online { color: var(--success); }
        .indicator.offline { color: var(--danger); }

        .indicator.online::after {
            content: ''; position: absolute; inset: 0; border-radius: 50%;
            background: var(--success); animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.4; }
            100% { transform: scale(2.2); opacity: 0; }
        }

        .status-label { font-size: 1.8rem; font-weight: 800; }

        .progress-container {
            width: 100%; height: 4px; background: rgba(255,255,255,0.05);
            margin-top: 30px; border-radius: 2px; overflow: hidden;
        }
        #progress-fill { height: 100%; width: 0%; background: var(--primary); transition: width 1s linear; }

        .logs-title {
            font-size: 1rem; font-weight: 800;
            margin-bottom: 20px; color: var(--text);
            display: flex; align-items: center; gap: 10px;
        }
        .logs-title::after { content: ''; flex-grow: 1; height: 1px; background: var(--border); }

        .log-item {
            padding: 15px;
            border-radius: 12px;
            background: rgba(255,255,255,0.02);
            margin-bottom: 12px;
            border-left: 4px solid var(--text-dim);
        }
        .log-item.up { border-left-color: var(--success); }
        .log-item.down { border-left-color: var(--danger); }

        .log-main { font-weight: 700; font-size: 0.95rem; margin-bottom: 2px; }
        .log-date { font-size: 0.8rem; color: var(--text-dim); }
        .log-duration {
            font-size: 0.75rem; font-family: 'JetBrains Mono', ui-monospace, monospace;
            background: rgba(255,255,255,0.05); padding: 4px 8px; border-radius: 6px;
            margin-top: 8px; display: inline-block;
        }
        .empty { text-align:center; color:var(--text-dim); padding:20px; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="main-title">
        <h1>LARP | Assistance Bot</h1>
        <p>Uptime Panel</p>
    </div>

    <div class="stats-grid">
        <div class="stat-box">
            <div class="stat-label">System Uptime</div>
            <div id="uptime-val" class="stat-value">100%</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Total Incidents</div>
            <div id="incidents-val" class="stat-value">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Last Checked</div>
            <div id="last-val" class="stat-value">--:--</div>
        </div>
    </div>

    <div class="card">
        <div class="status-hero">
            <div id="indicator" class="indicator">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
            </div>
            <div id="status-text" class="status-label">INITIALIZING...</div>
            <div class="progress-container">
                <div id="progress-fill"></div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="logs-title">Incident History</div>
        <div id="logs-list">
            <div class="empty">Loading incidents…</div>
        </div>
    </div>
</div>

<script>
    // ───────────────────────────────────────────
    // Config
    // ───────────────────────────────────────────
    // Incidents are stored on the server in incidents.json (no localStorage).
    //
    // BASE is the bot's HTTP server. When this panel is served by the bot
    // itself, relative paths work. But if the panel is opened from anywhere
    // else (GitHub Pages, a file:// path, another domain), relative paths would
    // hit the WRONG host and the bot would always look "OFFLINE" even when it
    // is online. So we hard-point BASE at the bot's public URL.
    //
    // If you self-host the panel on the SAME server as the bot, you can set
    // BASE = "" to use relative paths instead.
    const BASE = "https://larp-assistance.onrender.com";

    // The bot's root URL returns plain "OK" when it's online. That's the
    // whole check — if "/" says OK, the bot is ONLINE.
    const CHECK_URL      = BASE + "/";               // bot online signal ("OK")
    const INCIDENTS_GET  = BASE + "/incidents.json"; // read stored incidents
    const INCIDENTS_POST = BASE + "/incidents";      // record a new incident
    const INTERVAL_MS    = 60000;                     // check every 60s

    let checks = 0;
    let success = 0;
    let lastStatus = null;     // 'online' | 'offline'
    let downStartTs = null;    // timestamp when current outage began

    // ───────────────────────────────────────────
    // Helpers
    // ───────────────────────────────────────────
    function fmtTime(d) { return d.toLocaleTimeString('en-US', { hour12: false }); }
    function fmtDate(d) { return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); }
    function fmtDuration(ms) {
        const m = Math.floor(ms / 60000);
        const s = Math.floor((ms % 60000) / 1000);
        return `Downtime Duration: ${m}m ${s}s`;
    }
    function escapeHtml(str) {
        return String(str)
            .replace(/&/g, "&amp;").replace(/</g, "&lt;")
            .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    // ───────────────────────────────────────────
    // Server I/O
    // ───────────────────────────────────────────
    async function fetchIncidents() {
        try {
            const res = await fetch(INCIDENTS_GET + "?t=" + Date.now());
            if (!res.ok) return [];
            const data = await res.json();
            return Array.isArray(data) ? data : [];
        } catch (e) {
            console.warn("Could not load incidents:", e);
            return [];
        }
    }

    async function postIncident(incident) {
        try {
            const res = await fetch(INCIDENTS_POST, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(incident)
            });
            return res.ok;
        } catch (e) {
            console.warn("Could not save incident:", e);
            return false;
        }
    }

    // ───────────────────────────────────────────
    // Status check
    // ───────────────────────────────────────────
    async function checkStatus() {
        const now = new Date();
        let isOnline = false;

        // Give the host up to 45s to respond (Render free tier can be slow to
        // wake from sleep). One slow reply shouldn't be marked as an outage.
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), 45000);
        try {
            const res = await fetch(CHECK_URL + "?t=" + now.getTime(), {
                cache: "no-store",
                signal: controller.signal
            });
            if (res.ok) {
                const text = (await res.text()).toUpperCase();
                if (text.includes("OK")) isOnline = true;
            }
        } catch (e) {
            isOnline = false;
        } finally {
            clearTimeout(timer);
        }

        checks++;
        if (isOnline) success++;

        updateHero(isOnline, fmtTime(now));
        await detectIncident(isOnline, now);
        resetProgressBar();
    }

    function updateHero(isOnline, timeStr) {
        document.getElementById("last-val").innerText = timeStr;
        document.getElementById("uptime-val").innerText =
            checks === 0 ? "100%" : ((success / checks) * 100).toFixed(2) + "%";

        const ind = document.getElementById("indicator");
        const txt = document.getElementById("status-text");

        if (isOnline) {
            ind.className = "indicator online";
            txt.innerText = "ONLINE";
            txt.style.color = "var(--success)";
        } else {
            ind.className = "indicator offline";
            txt.innerText = "OFFLINE";
            txt.style.color = "var(--danger)";
        }
    }

    // Records an incident on the server ONLY when the state actually changes.
    async function detectIncident(isOnline, now) {
        const current = isOnline ? "online" : "offline";

        if (lastStatus !== null && lastStatus !== current) {
            const incident = {
                type: isOnline ? "up" : "down",
                message: isOnline ? "System Restored" : "Connection Lost",
                date: fmtDate(now),
                time: fmtTime(now)
            };

            if (!isOnline) {
                downStartTs = now.getTime();
            } else if (downStartTs) {
                incident.duration = fmtDuration(now.getTime() - downStartTs);
                downStartTs = null;
            }

            const ok = await postIncident(incident);
            if (ok) await refreshLogs();
        }

        lastStatus = current;
    }

    // ───────────────────────────────────────────
    // Render
    // ───────────────────────────────────────────
    async function refreshLogs() {
        const incidents = await fetchIncidents();
        incidents.sort((a, b) => (b.id || 0) - (a.id || 0)); // newest first

        document.getElementById("incidents-val").innerText =
            incidents.filter(l => l.type === "down").length;

        const list = document.getElementById("logs-list");
        if (incidents.length === 0) {
            list.innerHTML = '<div class="empty">Monitoring active. No incidents to report.</div>';
            return;
        }

        list.innerHTML = incidents.map(l => `
            <div class="log-item ${l.type === 'up' ? 'up' : 'down'}">
                <div class="log-main" style="color:${l.type === 'up' ? 'var(--success)' : 'var(--danger)'}">
                    ${l.type === 'up' ? '▲' : '▼'} ${escapeHtml(l.message || (l.type === 'up' ? 'System Restored' : 'Connection Lost'))}
                </div>
                <div class="log-date">${escapeHtml(l.date || '')} ${l.time ? 'at ' + escapeHtml(l.time) : ''}</div>
                ${l.duration ? `<div class="log-duration">${escapeHtml(l.duration)}</div>` : ''}
            </div>
        `).join("");
    }

    function resetProgressBar() {
        const fill = document.getElementById("progress-fill");
        fill.style.transition = "none";
        fill.style.width = "0%";
        setTimeout(() => {
            fill.style.transition = "width " + (INTERVAL_MS / 1000) + "s linear";
            fill.style.width = "100%";
        }, 100);
    }

    // ───────────────────────────────────────────
    // Boot
    // ───────────────────────────────────────────
    (async function init() {
        await refreshLogs();
        await checkStatus();
        setInterval(checkStatus, INTERVAL_MS);
    })();
</script>

</html>
