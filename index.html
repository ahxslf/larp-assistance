<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LARP | Assistance Bot Status</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --card: #0f121a;
            --primary: #5865F2;
            --success: #10b981;
            --danger: #ef4444;
            --text: #ffffff;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .dashboard {
            width: 100%;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .main-title {
            text-align: center;
        }
        .main-title h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(90deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .main-title p {
            color: var(--primary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            margin-top: 5px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }
        .stat-box {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
        }
        .stat-label { color: var(--text-dim); font-size: 0.75rem; text-transform: uppercase; margin-bottom: 5px; font-weight: 600; }
        .stat-value { font-size: 1.25rem; font-weight: 800; }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
        }

        .status-hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .indicator {
            width: 70px; height: 70px; border-radius: 50%;
            margin-bottom: 20px; position: relative;
            background: #1a1f2e;
            display: flex; justify-content: center; align-items: center;
        }
        .indicator.online { color: var(--success); }
        .indicator.offline { color: var(--danger); }
        
        .indicator.online::after {
            content: ''; position: absolute; inset: 0; border-radius: 50%;
            background: var(--success); animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.4; }
            100% { transform: scale(2.2); opacity: 0; }
        }

        .status-label { font-size: 1.8rem; font-weight: 800; }
        
        .progress-container {
            width: 100%; height: 4px; background: rgba(255,255,255,0.05);
            margin-top: 30px; border-radius: 2px; overflow: hidden;
        }
        #progress-fill { height: 100%; width: 0%; background: var(--primary); transition: width 1s linear; }

        .logs-title {
            font-size: 1rem; font-weight: 800;
            margin-bottom: 20px; color: var(--text);
            display: flex; align-items: center; gap: 10px;
        }
        .logs-title::after { content: ''; flex-grow: 1; height: 1px; background: var(--border); }

        .log-item {
            padding: 15px;
            border-radius: 12px;
            background: rgba(255,255,255,0.02);
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--text-dim);
        }
        .log-item.up { border-left-color: var(--success); }
        .log-item.down { border-left-color: var(--danger); }
        
        .log-main { font-weight: 700; font-size: 0.95rem; margin-bottom: 2px; }
        .log-date { font-size: 0.8rem; color: var(--text-dim); }
        .log-duration { 
            font-size: 0.75rem; font-family: 'JetBrains Mono', monospace;
            background: rgba(255,255,255,0.05); padding: 4px 8px; border-radius: 6px;
            margin-top: 8px; display: inline-block;
        }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="main-title">
        <h1>LARP | Assistance Bot</h1>
        <p>Uptime Panel</p>
    </div>

    <div class="stats-grid">
        <div class="stat-box">
            <div class="stat-label">System Uptime</div>
            <div id="uptime-val" class="stat-value">100%</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Total Incidents</div>
            <div id="incidents-val" class="stat-value">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Last Checked</div>
            <div id="last-val" class="stat-value">--:--</div>
        </div>
    </div>

    <div class="card">
        <div class="status-hero">
            <div id="indicator" class="indicator">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
            </div>
            <div id="status-text" class="status-label">INITIALIZING...</div>
            <div class="progress-container">
                <div id="progress-fill"></div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="logs-title">Incident History</div>
        <div id="logs-list">
            <!-- Incident records -->
        </div>
    </div>
</div>

<script>
    const TARGET = "https://larp-assistance.onrender.com/";
    
    let history = JSON.parse(localStorage.getItem('nj_final_logs') || '[]');
    let checks = parseInt(localStorage.getItem('nj_final_total') || '0');
    let success = parseInt(localStorage.getItem('nj_final_success') || '0');
    let lastStatus = null;
    let downStart = localStorage.getItem('nj_final_downstart') ? parseInt(localStorage.getItem('nj_final_downstart')) : null;

    async function checkStatus() {
        const now = new Date();
        const timeStr = now.toLocaleTimeString('en-US', { hour12: false });
        const dateStr = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        let isOnline = false;

        // Try multiple proxies like the version that worked
        const proxies = [
            `https://api.allorigins.win/get?url=${encodeURIComponent(TARGET)}&t=${now.getTime()}`,
            `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(TARGET)}`,
            `https://thingproxy.freeboard.io/fetch/${TARGET}`
        ];

        for (const url of proxies) {
            try {
                const res = await fetch(url);
                if (!res.ok) continue;

                let content = "";
                if (url.includes("allorigins")) {
                    const data = await res.json();
                    content = data.contents || "";
                } else {
                    content = await res.text();
                }

                if (content.toUpperCase().includes("OK")) {
                    isOnline = true;
                    break; 
                }
            } catch (e) {
                console.warn("Proxy failed, trying next...");
            }
        }

        checks++;
        if (isOnline) success++;

        updateDashboard(isOnline, timeStr);
        processHistory(isOnline, dateStr, timeStr, now.getTime());
        
        localStorage.setItem('nj_final_total', checks);
        localStorage.setItem('nj_final_success', success);
        resetProgressBar();
    }

    function updateDashboard(isOnline, timeStr) {
        document.getElementById("last-val").innerText = timeStr;
        document.getElementById("uptime-val").innerText = checks === 0 ? "100%" : ((success/checks)*100).toFixed(2) + "%";
        document.getElementById("incidents-val").innerText = history.filter(l => l.type === 'down').length;

        const ind = document.getElementById("indicator");
        const txt = document.getElementById("status-text");

        if (isOnline) {
            ind.className = "indicator online";
            txt.innerText = "ONLINE";
            txt.style.color = "var(--success)";
        } else {
            ind.className = "indicator offline";
            txt.innerText = "OFFLINE";
            txt.style.color = "var(--danger)";
        }
    }

    function processHistory(isOnline, date, time, ts) {
        const current = isOnline ? 'online' : 'offline';
        if (lastStatus !== null && lastStatus !== current) {
            let log = { 
                date, time, ts, 
                type: isOnline ? 'up' : 'down', 
                msg: isOnline ? 'System Restored' : 'Connection Lost' 
            };

            if (!isOnline) {
                downStart = ts;
                localStorage.setItem('nj_final_downstart', downStart);
            } else if (isOnline && downStart) {
                const diff = ts - downStart;
                const m = Math.floor(diff / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                log.duration = `Downtime Duration: ${m}m ${s}s`;
                downStart = null;
                localStorage.removeItem('nj_final_downstart');
            }

            history.unshift(log);
            if (history.length > 100) history.pop();
            localStorage.setItem('nj_final_logs', JSON.stringify(history));
            renderLogs();
        }
        lastStatus = current;
    }

    function renderLogs() {
        const list = document.getElementById("logs-list");
        if (history.length === 0) {
            list.innerHTML = '<div style="text-align:center; color:var(--text-dim); padding:20px;">Monitoring active. No incidents to report.</div>';
            return;
        }
        list.innerHTML = history.map(l => `
            <div class="log-item ${l.type}">
                <div>
                    <div class="log-main" style="color:${l.type === 'up' ? 'var(--success)' : 'var(--danger)'}">
                        ${l.type === 'up' ? '▲' : '▼'} ${l.msg}
                    </div>
                    <div class="log-date">${l.date} at ${l.time}</div>
                    ${l.duration ? `<div class="log-duration">${l.duration}</div>` : ''}
                </div>
            </div>
        `).join('');
    }

    function resetProgressBar() {
        const fill = document.getElementById("progress-fill");
        fill.style.transition = 'none';
        fill.style.width = '0%';
        setTimeout(() => {
            fill.style.transition = 'width 60s linear';
            fill.style.width = '100%';
        }, 100);
    }

    renderLogs();
    checkStatus();
    setInterval(checkStatus, 60000);
</script>

</html>
